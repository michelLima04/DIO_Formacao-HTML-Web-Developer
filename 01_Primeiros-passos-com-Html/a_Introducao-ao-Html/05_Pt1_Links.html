<html>  
    <head>
        <title>Estrutura Básica do HTML</title> 
    <body>
        <h1>Links em HTML</h1>  

        <!-- a: Tag de link (âncora)-->
        <!-- href: Especifica a URL do link-->
        <!-- _blank: Abre o link em uma nova aba-->
        <!-- self: Abre o link na mesma aba-->
        
        <ul>
            <li>
                <a href="https://www.google.com" target="_blank" title="Clique para abrir em uma nova aba">Google</a> 
            </li>
            <li>
                <a href="https://www.dio.me" target="_self" title="Clique para abrir na mesma aba">Dio.me</a> 
            </li>
        </ul>

        <p> Testando a navegação para outra página do site :</p>
           <a href="05_Pt2_Links.html" target="_self">Sobre a página</a> 
        </p>

        

    </body>
</html>
