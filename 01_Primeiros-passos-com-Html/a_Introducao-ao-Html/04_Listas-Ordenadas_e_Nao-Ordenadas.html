<html>  
    <head>
        <title>Estrutura Básica do HTML</title> 
    </head>
    <body>
        <h1>Listas em HTML</h1>                  
        
        <p>Lista ordenada:</p>
        <ol>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ol>

        <p>Lista não ordenada:</p>
        <ul>
            <li>Item A</li>
            <li>Item B</li>
            <li>Item C</li> 
        </ul>
    </body>
</html>
